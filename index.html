<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRUS</title>
<meta name="theme-color" content="#0f1117">
<style>
body{
margin:0;
font-family:-apple-system,Arial,sans-serif;
background:#0f1117;
color:white;
}

.container{
max-width:430px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
padding:16px;
}

.header{
font-size:28px;
font-weight:700;
margin-bottom:16px;
}

.chat{
flex:1;
background:#1a1d26;
border-radius:16px;
padding:14px;
min-height:60vh;
white-space:pre-wrap;
overflow-y:auto;
margin-bottom:12px;
}

.input-area{
display:flex;
gap:8px;
margin-bottom:12px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
border-radius:12px;
background:#4a6cff;
color:white;
font-size:16px;
}

.menu{
display:flex;
justify-content:space-around;
background:#1a1d26;
border-radius:16px;
padding:12px 0;
font-size:14px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">CIRUS</div>

  <div id="chat" class="chat">Cirus: Hazırım Yusuf ✅</div>

  <div class="input-area">
    <input id="msg" type="text" placeholder="Mesaj yaz">
    <button id="sendBtn">Gönder</button>
  </div>

  <div class="menu">
    <div>💬<br>Chat</div>
    <div>🧠<br>Profil</div>
    <div>🔎<br>Araştır</div>
  </div>
</div>

<script>
const worker = "https://cirus-worker.cirus-backend.workers.dev/";
let profile = JSON.parse(localStorage.getItem("cirus_profile") || "{}");

function saveProfile() {
  localStorage.setItem("cirus_profile", JSON.stringify(profile));
}

function learn(text) {
  let t = text.toLowerCase();

  if (t.includes("adım")) {
    let parts = text.split("adım");
    if (parts[1]) {
      profile.name = parts[1].trim();
    }
  }

  if (t.includes("yaşım")) {
    let parts = text.split("yaşım");
    if (parts[1]) {
      profile.age = parts[1].trim();
    }
  }

  if (t.includes("seviyorum")) {
    let parts = text.split("seviyorum");
    if (parts[1]) {
      profile.likes = parts[1].trim();
    }
  }

  saveProfile();
}

async function sendMessage() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");
  const text = input.value.trim();

  if (!text) return;

  chat.innerText += "\n\nSen: " + text;
  learn(text);
  input.value = "";

  try {
    const r = await fetch(worker, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: text })
    });

    const data = await r.json();
    let reply = data.reply || "Cevap alınamadı.";

    if (profile.name || profile.age || profile.likes) {
      reply += "\n\n[Profil Hafızası]";
      if (profile.name) reply += "\nAd: " + profile.name;
      if (profile.age) reply += "\nYaş: " + profile.age;
      if (profile.likes) reply += "\nSevdiği şey: " + profile.likes;
    }

    chat.innerText += "\n\nCirus: " + reply;
  } catch (e) {
    chat.innerText += "\n\nCirus: Bağlantı hatası oluştu.";
  }

  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("msg").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});
</script>

</body>
</html>
