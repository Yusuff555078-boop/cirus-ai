<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRUS</title>

<style>

body{
margin:0;
font-family:-apple-system,Arial;
background:#0f1117;
color:white;
}

.container{
max-width:430px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:16px;
font-size:24px;
font-weight:700;
}

.chat{
flex:1;
overflow:auto;
padding:10px;
}

.input{
display:flex;
padding:10px;
gap:8px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#4a6cff;
color:white;
}

.menu{
display:flex;
justify-content:space-around;
background:#1a1d26;
padding:12px 0;
}

.menu div{
text-align:center;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
CIRUS
</div>

<div id="chat" class="chat">
Cirus: Hazırım Yusuf ✅
</div>

<div class="input">
<input id="msg" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>
</div>

<div class="menu">

<div>
💬<br>Chat
</div>

<div>
🧠<br>Profil
</div>

<div>
🔎<br>Araştır
</div>

</div>

</div>

<script>

const worker="https://cirus-worker.cirus-backend.workers.dev/";

async function send(){

let input=document.getElementById("msg")
let chat=document.getElementById("chat")

let text=input.value

if(!text) return

chat.innerText+="\n\nSen: "+text

input.value=""

let r=await fetch(worker,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
})

let data=await r.json()

chat.innerText+="\n\nCirus: "+data.reply

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>
