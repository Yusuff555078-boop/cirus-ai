<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRUS</title>

<style>
body{
margin:0;
font-family:-apple-system,Arial;
background:#0f1117;
color:white;
}

.container{
max-width:430px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:16px;
font-size:24px;
font-weight:700;
}

.chat{
flex:1;
overflow:auto;
padding:10px;
white-space:pre-wrap;
}

.input{
display:flex;
padding:10px;
gap:8px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#4a6cff;
color:white;
}

.menu{
display:flex;
justify-content:space-around;
background:#1a1d26;
padding:12px 0;
}

.menu div{
text-align:center;
font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
CIRUS
</div>

<div id="chat" class="chat">
Cirus: Hazırım Yusuf ✅
</div>

<div class="input">
<input id="msg" placeholder="Mesaj yaz">
<button onclick="send()">Gönder</button>
</div>

<div class="menu">
<div>💬<br>Chat</div>
<div>🧠<br>Profil</div>
<div>🔎<br>Araştır</div>
</div>

</div>

<script>
const worker = "https://cirus-worker.cirus-backend.workers.dev/";

let profile = {};

function learn(text){
  let t = text.toLowerCase();

  if(t.includes("adım")){
    let parts = text.split("adım");
    if(parts[1]){
      profile.name = parts[1].trim();
    }
  }

  if(t.includes("yaşım")){
    let parts = text.split("yaşım");
    if(parts[1]){
      profile.age = parts[1].trim();
    }
  }

  if(t.includes("seviyorum")){
    let parts = text.split("seviyorum");
    if(parts[1]){
      profile.likes = parts[1].trim();
    }
  }
}

async function send(){

  let input = document.getElementById("msg");
  let chat = document.getElementById("chat");

  let text = input.value.trim();

  if(!text) return;

  chat.innerText += "\n\nSen: " + text;

  learn(text);

  input.value = "";

  try{
    let r = await fetch(worker,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({text:text})
    });

    let data = await r.json();

    let reply = data.reply || "Cevap alınamadı.";

    if(profile.name || profile.age || profile.likes){
      reply += "\n\n[Profil Hafızası]";
      if(profile.name) reply += "\nAd: " + profile.name;
      if(profile.age) reply += "\nYaş: " + profile.age;
      if(profile.likes) reply += "\nSevdiği şey: " + profile.likes;
    }

    chat.innerText += "\n\nCirus: " + reply;
  }catch(error){
    chat.innerText += "\n\nCirus: Bağlantı hatası oluştu.";
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
