<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIRUS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    #chat {
      background: #1a1d26;
      border-radius: 12px;
      padding: 15px;
      min-height: 300px;
      margin-bottom: 15px;
      white-space: pre-wrap;
      overflow-y: auto;
    }

    #msg {
      width: 68%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #4a6cff;
      color: white;
      font-size: 16px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

  <h1>CIRUS</h1>

  <div id="chat">Cirus: Hazırım Yusuf ✅</div>

  <input id="msg" type="text" placeholder="Mesaj yaz">
  <button id="sendBtn">Gönder</button>

  <script>
    const workerUrl = "https://cirus-worker.cirus-backend.workers.dev/";

    async function sendMessage() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const text = input.value.trim();

      if (!text) return;

      chat.innerText += "\n\nSen: " + text;
      input.value = "";

      try {
        const response = await fetch(workerUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        if (data.reply) {
          chat.innerText += "\n\nCirus: " + data.reply;
        } else {
          chat.innerText += "\n\nCirus: Cevap alınamadı.";
        }
      } catch (error) {
        chat.innerText += "\n\nCirus: Bağlantı hatası oluştu.";
      }

      chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    document.getElementById("msg").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
