<script>

const worker = "https://cirus-worker.cirus-backend.workers.dev/";

let profile = JSON.parse(localStorage.getItem("cirus_profile")) || {}

function saveProfile(){
localStorage.setItem("cirus_profile",JSON.stringify(profile))
}

function learn(text){

let t=text.toLowerCase()

if(t.includes("adım")){
let p=text.split("adım")[1]
if(p){
profile.name=p.trim()
}
}

if(t.includes("yaşım")){
let p=text.split("yaşım")[1]
if(p){
profile.age=p.trim()
}
}

if(t.includes("seviyorum")){
let p=text.split("seviyorum")[1]
if(p){
profile.likes=p.trim()
}
}

saveProfile()

}

async function send(){

let input=document.getElementById("msg")
let chat=document.getElementById("chat")

let text=input.value.trim()

if(!text) return

chat.innerText+="\n\nSen: "+text

learn(text)

input.value=""

try{

let r=await fetch(worker,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({text:text})
})

let data=await r.json()

let reply=data.reply || "Cevap alınamadı."

if(profile.name || profile.age || profile.likes){

reply+="\n\n[Profil Hafızası]"

if(profile.name){
reply+="\nAd: "+profile.name
}

if(profile.age){
reply+="\nYaş: "+profile.age
}

if(profile.likes){
reply+="\nSevdiği şey: "+profile.likes
}

}

chat.innerText+="\n\nCirus: "+reply

}catch(e){

chat.innerText+="\n\nCirus: Bağlantı hatası."

}

chat.scrollTop=chat.scrollHeight

}

</script>
